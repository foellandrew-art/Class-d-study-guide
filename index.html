<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport" content="width=device-width, initial-scale=1.0"
  />
  <title>MN Class D Master — GDL & Study Hub</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (UMD) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone (so we can write JSX without a bundler) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet" />

  <style>
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system; background: #f8fafc; color: #0f172a; }
    @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slide-up { animation: slideUp .25s ease-out both; }
    .u-icon { font-style: normal; display: inline-block; line-height: 1; }
    .kbd { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background:#f1f5f9; border:1px solid #e2e8f0; border-bottom-width:2px; padding:.1rem .35rem; border-radius:.35rem;}
  </style>
</head>
<body class="max-w-2xl mx-auto min-h-screen p-4 sm:p-6">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    /*************************************************************************
     * Data — 6 Chapters (expandable)
     *************************************************************************/
    const CHAPTERS = [
      {

        ],
        questions: [
          { type: "mc", q: "Minimum age to apply for an MN Instruction Permit?", options: ["14", "15", "16", "18"], a: 1 },
          { type: "tf", q: "True/False: Under Vanessa's Law, a crash-related violation can delay licensing until 18.", a: true },
          { type: "fib", q: "A permit holder must be accompanied by a licensed driver at least _____ years old.", a: "21" },
          { type: "mc", q: "How many supervised hours are required (incl. night hours)?", options: ["30 (10 night)", "40 (10 night)", "50 (15 night)", "60 (20 night)"], a: 2 },

          "Always clear windows of snow/ice before driving.",

        questions: [

          { type: "tf", q: "True/False: Headlights required if visibility is under 500 feet.", a: true },
          { type: "fib", q: "Use headlights whenever you use your ______.", a: "wipers" },
          { type: "mc", q: "Before driving in winter, you should", options: ["Scrape windshield only", "Clear all windows & lights", "Warm engine only", "Drive slowly with snow on roof"], a: 1 },
        ],
      },
      {
        id: 3,
        title: "Traffic Control & Signs",
        manual: "Chapter 3",
        statute: "Minn. Stat. § 169.06",
        summary: [
          "Obey traffic control devices (signs, signals, markings).",
          "Red = stop; Yellow = prepare to stop; Green = go if safe.",
          "Stop/yield signs control right-of-way at intersections.",
          "Regulatory signs (white/black) are laws; warning signs (yellow) advise.",
          "Lane control & pavement markings guide turns and passing.",
        ],
        questions: [
          { type: "mc", q: "A flashing red signal means:", options: ["Proceed with caution", "Stop, then proceed", "Stop & wait for green", "Yield only"], a: 1 },
          { type: "tf", q: "True/False: Yellow lines separate traffic moving in opposite directions.", a: true },
          { type: "fib", q: "A white rectangular sign with black letters is usually a ______ sign.", a: "regulatory" },
          { type: "mc", q: "At a steady yellow light you should:", options: ["Speed up", "Prepare to stop if safe", "Stop immediately no matter what", "Turn on hazard lights"], a: 1 },
        ],
      },
      {
        id: 4,
        title: "Right‑of‑Way & Sharing the Road",
        manual: "Chapter 4",

        summary: [

          "Zipper Merge: take turns at the merge point in congestion.",
          "Give cyclists 3 feet when passing; watch for trucks’ big No‑Zones.",
        ],
        questions: [
          { type: "mc", q: "At an uncontrolled intersection arriving together, who yields?", options: ["Driver on right yields", "Driver on left yields", "Neither yields", "Faster vehicle goes first"], a: 1 },
          { type: "tf", q: "True/False: You must stop for a pedestrian in a marked crosswalk.", a: true },
          { type: "fib", q: "On a Zipper Merge, drivers should take ______ at the merge point.", a: "turns" },
          { type: "mc", q: "Minimum safe distance when passing a cyclist?", options: ["1 ft", "2 ft", "3 ft", "5 ft"], a: 2 },

      {

          "Increase following distance in rain/snow/ice and behind trucks.",

          "Avoid distractions; keep eyes moving, leave yourself an out.",
        ],
        questions: [
          { type: "mc", q: "Basic Speed Law means you must:", options: ["Drive at limit always", "Adjust to conditions", "Match traffic only", "Use cruise control"], a: 1 },
          { type: "tf", q: "True/False: Stopping distance increases as speed increases.", a: true },
          { type: "fib", q: "Signal at least ______ feet before turning.", a: "100" },
          { type: "mc", q: "Best following distance on wet roads?", options: ["2 seconds", "3 seconds", "4+ seconds", "1 second"], a: 2 },
        ],
      },
      {
        id: 6,
        title: "Adverse Conditions & Impairment",
        manual: "Chapter 6",
        statute: "Minn. Stat. §§ 169A & 169.13",
        summary: [
          "Hydroplaning can start ~35 mph; ease off gas, don’t brake hard.",
          "Fog: low‑beam headlights; increase following distance.",
          "DWI limit 0.08 for 21+; 'Not a Drop' for under 21 (zero tolerance).",
          "Implied consent: test refusal triggers penalties.",
          "Never drive under influence of alcohol, drugs, or impairing meds.",
        ],
        questions: [
          { type: "mc", q: "Hydroplaning can begin around:", options: ["25 mph", "35 mph", "45 mph", "55 mph"], a: 1 },
          { type: "tf", q: "True/False: Use high beams in fog for better visibility.", a: false },
          { type: "fib", q: "Under 21, the 'Not a Drop' law means a BAC of _____ is unlawful.", a: "any" },
          { type: "mc", q: "If you start to hydroplane, you should:", options: ["Brake hard", "Steer left quickly", "Ease off gas, steer straight", "Accelerate"], a: 2 },
        ],
      },
    ];

    /*************************************************************************
     * Utilities
     *************************************************************************/
    const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
    const STORAGE_KEY = "mncd_progress_v1";

    const loadProgress = () => {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { certified: {} }; }
      catch { return { certified: {} }; }
    };
    const saveProgress = (data) => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data || { certified: {} }));
    };

    /*************************************************************************
     * Components
     *************************************************************************/
    function Header({ userLike, onReset }) {
      return (
        <div className="flex justify-between items-center mb-6 px-1">
          <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
            {userLike ? `Local Save: ${userLike}` : "Local Save: Ready"}
          </div>
          <button
            className="text-[10px] font-black uppercase text-rose-600 hover:text-rose-700"
            onClick={onReset}
            title="Clear saved certifications and progress"
          >
            Reset Progress
          </button>
        </div>
      );
    }

    function ChapterCard({ chapter, certified, onOpen }) {
      return (
        <button
          onClick={() => onOpen(chapter)}
          className="w-full bg-white p-5 rounded-2xl border border-slate-200 flex justify-between items-center active:scale-[0.98] transition-transform"
        >
          <div className="flex items-center gap-4">
            <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black ${certified ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-400'}`}>
              {certified ? '✓' : chapter.id}
            </div>
            <div className="text-left">
              <p className="font-black text-slate-800 text-sm">{chapter.title}</p>
              <p className="text-[9px] text-slate-400 uppercase font-black">{chapter.manual}</p>
            </div>
          </div>
          <span className="text-slate-400 text-lg">›</span>
        </button>
      );
    }

    function ReviewBlock({ chapter }) {
      return (
        <div className="bg-white rounded-[2rem] p-6 sm:p-8 border border-slate-200 space-y-5">
          <div>
            <h2 className="text-2xl font-black uppercase">{chapter.title}</h2>
            <p className="text-[10px] font-black text-slate-400 uppercase">{chapter.manual} • {chapter.statute}</p>
          </div>
          <div className="bg-blue-50 border border-blue-100 p-4 rounded-2xl">
            <p className="text-[10px] font-black text-blue-600 uppercase mb-2">Study Summary</p>
            <ul className="text-sm text-slate-700 space-y-2 list-disc pl-5">
              {chapter.summary.map((line, idx) => <li key={idx}>{line}</li>)}
            </ul>
          </div>
          <div className="bg-slate-50 border border-slate-200 p-4 rounded-2xl">
            <p className="text-[10px] font-black text-slate-500 uppercase mb-2">Sample Questions</p>
            <ul className="text-sm text-slate-700 space-y-1 list-disc pl-5">
              {chapter.questions.slice(0, Math.min(3, chapter.questions.length)).map((q, idx) =>
                <li key={idx}>{q.q.replace("blank", "_______")}</li>
              )}
            </ul>
          </div>
        </div>
      );
    }

    function QuestionBlock({ q, onAnswer }) {
      // Render MC / TF / FIB (with input box)
      const [fibValue, setFibValue] = useState("");
      useEffect(() => { setFibValue(""); }, [q]);
      return (
        <div className="space-y-4">
